<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #image-container {
            position: relative;
            cursor: pointer;
        }
        #image-container img {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: auto;
        }
        #prev-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 50%;
            height: 100%;
        }
        #next-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 50%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="image-container">
        <img id="current-image" src="" alt="Image">
        <div id="prev-btn"></div>
        <div id="next-btn"></div>
    </div>

    <script>
        let imageLinks = [];
        let currentImageIndex = 0;

        function displayImage(index) {
            const img = document.getElementById('current-image');
            img.src = imageLinks[index];
            currentImageIndex = index;
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % imageLinks.length;
            displayImage(currentImageIndex);
        }

        function showPreviousImage() {
            currentImageIndex = (currentImageIndex - 1 + imageLinks.length) % imageLinks.length;
            displayImage(currentImageIndex);
        }

        document.getElementById('prev-btn').addEventListener('click', showPreviousImage);
        document.getElementById('next-btn').addEventListener('click', showNextImage);

		async function getDivFromLink(link, divId) {
			try {
				const response = await fetch(link);
				const html = await response.text();

				const doc = new DOMParser().parseFromString(html, 'text/html');
        		const targetDiv = doc.getElementById(divId);

				if (targetDiv) {
					return targetDiv.innerHTML;
				} else {
					return undefined;
				}
			} catch (error) {
				return `Error: ${error.message}`;
			}
		}

		async function getImageLinks(link, divId) {
			let imgs = [];
			let i = 1;
			while (true) {
				const divContent = await getDivFromLink(link, divId + i);
				if (divContent === undefined) break;
				const doc = new DOMParser().parseFromString(divContent, 'text/html');
        		const imgElements = doc.querySelectorAll('img');
				imgElements.forEach((img) => {
					const imgSrc = img.getAttribute('src');
					if (imgSrc) imgs.push(imgSrc);
				});
				i++;
			}
			return imgs;
		}

        async function fetchImageLinks() {
            const link = await prompt("Enter the link:");
			try {
				const imgs = await getImageLinks(`https://cors-anywhere.herokuapp.com/${link}`, 'gallery-');
				console.log(imgs);
				imageLinks = imgs;
				displayImage(0)
			} catch (error) {
				console.error(error);
			}
        }

        fetchImageLinks();
    </script>
</body>
</html>
